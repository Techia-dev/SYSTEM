services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: system
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:admin123@db:5432/system?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-at-least-32-chars}
      JWT_ACCESS_TOKEN_TTL: 15m
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: