services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: system
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:admin123@db:5432/system?schema=public
      JWT_SECRET: ce5236234f23f94f612b7c06db1f354842159c851d14d61bbce6267e10d3eab690971ad28cad9205ced14604ed98044af6c154ae386595d2c6dfed3461144a4c
      JWT_ACCESS_TOKEN_TTL: 15m
      CORS_ORIGINS: https://system-web-six.vercel.app
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: